{% extends "layout.html" %}

{% block content %}
  <section class="card">
    <h2>{{ heading }}</h2>
    <p class="muted">{{ subheading }}</p>
  </section>

  <section class="card">
    <form method="post" action="{{ action }}">
      <div class="form-grid">
        {% for f in fields %}
          {% set is_id = (f.name == "id" and teacher) %}
          <label class="field">
            <span class="label">{{ f.label }}{% if f.required %} *{% endif %}</span>
            {% if f.type == "select" and f.options %}
              <select class="input" name="{{ f.name }}" {% if f.required %}required{% endif %} {% if is_id %}disabled{% endif %}>
                <option value="">-- Select --</option>
                {% for opt in f.options %}
                  {% set val = (opt.value if opt.value is defined else opt) %}
                  {% set lab = (opt.label if opt.label is defined else opt) %}
                  {% set selected = (teacher and teacher.get(f.name) == val) %}
                  <option value="{{ val }}" {% if selected %}selected{% endif %}>{{ lab }}</option>
                {% endfor %}
              </select>
            {% else %}
              <input
                class="input"
                type="{{ f.type }}"
                name="{{ f.name }}"
                value="{{ (teacher.get(f.name) if teacher else '') }}"
                {% if is_id %}readonly{% endif %}
                {% if f.required %}required{% endif %}
              />
            {% endif %}
          </label>
        {% endfor %}
      </div>

      <div class="actions">
        <button class="btn" type="submit">{{ submit_label }}</button>
        <a class="btn btn-ghost" href="/teachers">Cancel</a>
      </div>
    </form>
  </section>
{% endblock %}
