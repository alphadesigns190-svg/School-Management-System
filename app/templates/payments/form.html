{% extends "layout.html" %}

{% block content %}
  <section class="card">
    <h2>{{ heading }}</h2>
    <p class="muted">{{ subheading }}</p>
  </section>

  <section class="card">
    <form method="post" action="{{ action or '/payments' }}">
      <div class="form-grid">
        <label class="field">
          <span class="label">Student ID *</span>
          <div class="input-prefix-wrap">
            <span class="input-prefix">ST-</span>
            <input
              class="input js-payment-student-number"
              type="text"
              name="student_number"
              value="{{ student_number if student_number is defined else '' }}"
              placeholder="001"
              maxlength="3"
              inputmode="numeric"
              pattern="[0-9]{3}"
              required
              autocomplete="off"
            />
          </div>
          <input class="js-payment-student-id-hidden" type="hidden" name="student_id" value="{{ payment.get('student_id') if payment else '' }}" />
        </label>

        <label class="field">
          <span class="label">Amount *</span>
          <div class="input-prefix-wrap">
            <span class="input-prefix">؋&nbsp;&nbsp;</span>
            <input class="input" type="number" min="1" step="1" name="amount" value="{{ payment.get('amount') if payment else '' }}" required />
          </div>
        </label>

        <label class="field">
          <span class="label">Payment Date</span>
          <input
            class="input"
            type="date"
            name="payment_date"
            value="{{ (payment.get('payment_date') if payment else default_date) }}"
          />
        </label>
      </div>

      <div class="card card-inner no-print" style="margin-top:14px;">
        <div class="card-head">
          <h3 class="card-title">Student Preview</h3>
        </div>
        <div class="report-grid">
          <div><span class="muted">Student ID:</span> <strong id="payment-student-id">-</strong></div>
          <div><span class="muted">Name:</span> <strong id="payment-student-name">-</strong></div>
          <div><span class="muted">Father Name:</span> <span id="payment-student-father">-</span></div>
          <div><span class="muted">Current Course:</span> <span id="payment-student-course">-</span></div>
          <div><span class="muted">Course Shift:</span> <span id="payment-student-shift">-</span></div>
          <div><span class="muted">Total Fee:</span> <span id="payment-total-fee">-</span></div>
          <div><span class="muted">Total Paid:</span> <span id="payment-total-paid">-</span></div>
          <div><span class="muted">Remaining:</span> <strong id="payment-remaining-balance">-</strong></div>
        </div>
      </div>

      <div class="actions">
        <button class="btn" type="submit">{{ submit_label }}</button>
        <a class="btn btn-ghost" href="/payments">Cancel</a>
      </div>
    </form>
  </section>
{% endblock %}
