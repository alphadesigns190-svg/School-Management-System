{% extends "layout.html" %}

{% block content %}
  <section class="card">
    <h2>{{ heading }}</h2>
    <p class="muted">{{ subheading }}</p>
  </section>

  <section class="card">
    <form method="post" action="{{ action }}">
      <div class="form-grid">
        <label class="field">
          <span class="label">Student *</span>
          <select class="input" name="student_id" required>
            <option value="">-- Select student --</option>
            {% for s in students %}
              {% set selected = (result and result.get("student_id") == s.id) %}
              <option value="{{ s.id }}" {% if selected %}selected{% endif %}>
                {{ s.name }} ({{ s.id }})
              </option>
            {% endfor %}
          </select>
        </label>

        <label class="field">
          <span class="label">Month *</span>
          <input class="input" type="text" name="month" value="{{ result.get('month') if result else '' }}" required />
        </label>

        <label class="field">
          <span class="label">Quiz 1</span>
          <input class="input js-mark" type="number" name="quiz1" value="{{ result.get('quiz1') if result else '' }}" />
        </label>
        <label class="field">
          <span class="label">Quiz 2</span>
          <input class="input js-mark" type="number" name="quiz2" value="{{ result.get('quiz2') if result else '' }}" />
        </label>
        <label class="field">
          <span class="label">Quiz 3</span>
          <input class="input js-mark" type="number" name="quiz3" value="{{ result.get('quiz3') if result else '' }}" />
        </label>
        <label class="field">
          <span class="label">Quiz 4</span>
          <input class="input js-mark" type="number" name="quiz4" value="{{ result.get('quiz4') if result else '' }}" />
        </label>
        <label class="field">
          <span class="label">Exam (20)</span>
          <input class="input js-mark" type="number" name="exam20" value="{{ result.get('exam20') if result else '' }}" />
        </label>
        <label class="field">
          <span class="label">Exam (30)</span>
          <input class="input js-mark" type="number" name="exam30" value="{{ result.get('exam30') if result else '' }}" />
        </label>
        <label class="field">
          <span class="label">Interview</span>
          <input class="input js-mark" type="number" name="interview" value="{{ result.get('interview') if result else '' }}" />
        </label>

        <label class="field">
          <span class="label">Total (auto)</span>
          <input class="input" type="number" name="total_marks" value="{{ result.get('total_marks') if result else '' }}" readonly />
        </label>
        <label class="field">
          <span class="label">Grade (auto)</span>
          <input class="input" type="text" name="grade" value="{{ result.get('grade') if result else '' }}" readonly />
        </label>
      </div>

      <div class="actions">
        <button class="btn" type="submit">{{ submit_label }}</button>
        <a class="btn btn-ghost" href="/results">Cancel</a>
      </div>
    </form>
  </section>
{% endblock %}
